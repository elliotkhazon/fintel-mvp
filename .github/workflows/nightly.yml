name: Nightly — Regression & Drift

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily

jobs:
  regression:
    runs-on: ubuntu-latest
    if: vars.FINTEL_WORKFLOWS_ENABLED == 'true'
    environment: staging
    permissions:
      id-token: write
      contents: read
    env:
      FINTEL_ENV: staging
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/fintel-ci-staging-role
          aws-region: us-east-1
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - run: pytest tests/regression/ -v --tb=short

  drift-detection:
    runs-on: ubuntu-latest
    if: vars.FINTEL_WORKFLOWS_ENABLED == 'true'
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/fintel-ci-staging-role
          aws-region: us-east-1
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "1.8" }
      - name: Plan — fail if drift detected
        run: |
          terraform -chdir=infra init \
            -backend-config="bucket=fintel-tf-state-staging" \
            -backend-config="key=fintel-mvp/staging.tfstate" \
            -backend-config="dynamodb_table=fintel-tf-locks-staging"
          terraform -chdir=infra plan -var-file="envs/staging.tfvars" \
            -detailed-exitcode   # exits 2 if plan is non-empty (drift detected)
